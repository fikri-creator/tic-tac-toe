<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic-Tac-Toe</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <h1>Tic-Tac-Toe</h1>

    <form id="player-form" class="player-form" autocomplete="off">
      <label>
        <span>Player 1 (X)</span>
        <input
          id="player-one-name"
          name="playerOne"
          type="text"
          maxlength="20"
          placeholder="Player One"
        />
      </label>
      <label>
        <span>Player 2 (O)</span>
        <input
          id="player-two-name"
          name="playerTwo"
          type="text"
          maxlength="20"
          placeholder="Player Two"
        />
      </label>
      <button id="start-btn" type="submit">Start / Restart</button>
    </form>

    <p id="status" class="status" aria-live="polite">Player One's turn (X)</p>

    <section id="board" class="board" aria-label="Tic-Tac-Toe board">
      <button class="cell" type="button" data-index="0" aria-label="Cell 1"></button>
      <button class="cell" type="button" data-index="1" aria-label="Cell 2"></button>
      <button class="cell" type="button" data-index="2" aria-label="Cell 3"></button>
      <button class="cell" type="button" data-index="3" aria-label="Cell 4"></button>
      <button class="cell" type="button" data-index="4" aria-label="Cell 5"></button>
      <button class="cell" type="button" data-index="5" aria-label="Cell 6"></button>
      <button class="cell" type="button" data-index="6" aria-label="Cell 7"></button>
      <button class="cell" type="button" data-index="7" aria-label="Cell 8"></button>
      <button class="cell" type="button" data-index="8" aria-label="Cell 9"></button>
    </section>
  </main>

  <!-- Modules are loaded in dependency order. -->
  <script src="js/gameboard.js"></script>
  <script src="js/player.js"></script>
  <script src="js/gameController.js"></script>
  <script src="js/displayController.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
